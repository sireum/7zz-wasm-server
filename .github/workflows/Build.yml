name: Build

on:
  push:

env:
  P7ZIP_V: '26.00'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install wasi-sdk
        run: |
          WASI_SDK_URL=$(curl -s https://api.github.com/repos/WebAssembly/wasi-sdk/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*x86_64-linux.tar.gz"' \
            | head -1 | cut -d'"' -f4)
          curl -LO "$WASI_SDK_URL"
          tar xzf wasi-sdk-*-x86_64-linux.tar.gz
          mv wasi-sdk-*-x86_64-linux ~/wasi-sdk
      - name: Install Binaryen
        run: |
          BINARYEN_URL=$(curl -s https://api.github.com/repos/WebAssembly/binaryen/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*x86_64-linux.tar.gz"' \
            | head -1 | cut -d'"' -f4)
          curl -LO "$BINARYEN_URL"
          tar xzf binaryen-*-x86_64-linux.tar.gz
          sudo cp binaryen-*/bin/* /usr/local/bin/
      - name: Build
        run: |
          bash build.sh
      - name: Install Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
      - name: Test
        run: scala-cli run test_server.sc
      - name: Upload WASM
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: 7zz_server_graal.wasm
          asset_name: 7zz-server-${{ env.P7ZIP_V }}.wasm
          tag: misc
          overwrite: true
      - name: Upload 7-Zip License
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: 7zip/DOC/License.txt
          asset_name: 7zz-server-${{ env.P7ZIP_V }}-license.txt
          tag: misc
          overwrite: true
      - name: Upload Wrapper License
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: license.txt
          asset_name: 7zz-wasm-server-license.txt
          tag: misc
          overwrite: true
